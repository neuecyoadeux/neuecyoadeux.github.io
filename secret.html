<style>
  html {
    height: 100%;
	margin: 0;
    background: black url("img/teve-dance.gif") no-repeat 50% 50%;
  }
  #hider {
    color: white;
    cursor: pointer;
    text-align: center;
    background-color: black;
    height: 100%;
    width: 100%;
  }
  #hider:hover {
    color: cyan;
  }
</style>
<div id="hider" onclick="unhide()"> click me </div>
<script>
  function unhide() {
    document.getElementById("hider").style.display="none";
    let audio = new Audio("audio/prize.mp3");
    audio.loop = true;
    audio.play();
  }
</script>
